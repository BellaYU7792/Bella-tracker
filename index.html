<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bella的打卡小窗口 ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #fdf6ec;
    --warm: #c8956c;
    --gold: #d4a853;
    --muted: #9b8878;
    --soft: #f0e6d8;
    --red: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    min-height: 100vh;
    font-family: 'DM Sans', 'Noto Serif SC', sans-serif;
    color: var(--ink);
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(200,149,108,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(212,168,83,0.06) 0%, transparent 50%);
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }

  .header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 20px auto 0;
  }

  .title {
    font-family: 'Playfair Display', 'Noto Serif SC', serif;
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--ink);
    line-height: 1.3;
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .date-display {
    text-align: center;
    margin-bottom: 36px;
    font-family: 'Noto Serif SC', serif;
    color: var(--warm);
    font-size: 0.9rem;
    letter-spacing: 0.1em;
  }

  .streak-banner {
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 36px;
  }

  .streak-label {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .streak-number {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    color: var(--gold);
    line-height: 1;
  }

  .streak-unit {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .section {
    margin-bottom: 32px;
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--soft);
  }

  .tasks {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: white;
    border-radius: 10px;
    border: 1.5px solid var(--soft);
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .task::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--soft);
    transition: background 0.2s;
  }

  .task:hover {
    border-color: var(--warm);
    transform: translateX(2px);
  }

  .task.done {
    background: #fdfaf6;
    border-color: var(--gold);
  }

  .task.done::before {
    background: var(--gold);
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--soft);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 11px;
  }

  .task.done .checkbox {
    background: var(--gold);
    border-color: var(--gold);
    color: white;
  }

  .task-emoji {
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .task-text {
    flex: 1;
    font-size: 0.9rem;
    color: var(--ink);
    font-family: 'Noto Serif SC', sans-serif;
  }

  .task.done .task-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--gold);
  }

  .task-time {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .mood-section {
    background: white;
    border-radius: 12px;
    border: 1.5px solid var(--soft);
    padding: 20px;
    margin-bottom: 32px;
  }

  .mood-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .moods {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .mood-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--soft);
    background: transparent;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'Noto Serif SC', sans-serif;
    color: var(--muted);
    transition: all 0.2s;
  }

  .mood-btn:hover {
    border-color: var(--warm);
    color: var(--warm);
  }

  .mood-btn.selected {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .note-section {
    background: white;
    border-radius: 12px;
    border: 1.5px solid var(--soft);
    padding: 20px;
    margin-bottom: 32px;
  }

  .note-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Noto Serif SC', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: transparent;
    line-height: 1.7;
    min-height: 80px;
    placeholder-color: var(--muted);
  }

  textarea::placeholder {
    color: var(--soft);
  }

  .progress-bar-wrap {
    background: var(--soft);
    border-radius: 4px;
    height: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--warm), var(--gold));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .save-btn {
    width: 100%;
    padding: 16px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif SC', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .save-btn:hover {
    background: var(--warm);
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--paper);
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 0.85rem;
    font-family: 'Noto Serif SC', sans-serif;
    transition: transform 0.3s ease;
    z-index: 100;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .weight-input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .weight-input {
    border: 1.5px solid var(--soft);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Noto Serif SC', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    width: 100px;
    outline: none;
    transition: border-color 0.2s;
  }

  .weight-input:focus {
    border-color: var(--warm);
  }

  .weight-unit {
    color: var(--muted);
    font-size: 0.85rem;
  }

  .weight-goal {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
  }

  .weight-diff {
    font-size: 0.8rem;
    color: var(--warm);
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="title">朝雨的修炼日记</div>
    <div class="subtitle">Bella's Daily Tracker</div>
  </div>

  <div class="date-display" id="dateDisplay"></div>

  <div class="streak-banner">
    <div>
      <div class="streak-label">连续打卡</div>
      <div class="streak-unit">坚持就是胜利 ✨</div>
    </div>
    <div style="text-align:right">
      <div class="streak-number" id="streakNum">0</div>
      <div class="streak-unit">天</div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label">
    <span>今日完成度</span>
    <span id="progressText">0 / 0</span>
  </div>

  <!-- 减肥 -->
  <div class="section">
    <div class="section-title">🏃 减肥计划</div>
    <div class="tasks" id="tasks-fitness"></div>
  </div>

  <!-- 学习 -->
  <div class="section">
    <div class="section-title">📚 今日学习</div>
    <div class="tasks" id="tasks-study"></div>
  </div>

  <!-- 音乐 -->
  <div class="section">
    <div class="section-title">🎋 竹笛练习</div>
    <div class="tasks" id="tasks-music"></div>
  </div>

  <!-- 体重记录 -->
  <div class="note-section">
    <div class="note-title">⚖️ 体重记录</div>
    <div class="weight-input-wrap">
      <input type="number" class="weight-input" id="weightInput" placeholder="66.0" step="0.1" min="40" max="100">
      <span class="weight-unit">kg</span>
    </div>
    <div class="weight-goal" id="weightInfo">目标：55kg ｜ 还需减 <span class="weight-diff" id="weightDiff">—</span></div>
  </div>

  <!-- 今日心情 -->
  <div class="mood-section">
    <div class="mood-title">今日心情</div>
    <div class="moods">
      <button class="mood-btn" onclick="selectMood(this)">🔥 斗志昂扬</button>
      <button class="mood-btn" onclick="selectMood(this)">🌸 平静美好</button>
      <button class="mood-btn" onclick="selectMood(this)">😌 还不错</button>
      <button class="mood-btn" onclick="selectMood(this)">😪 有点累</button>
      <button class="mood-btn" onclick="selectMood(this)">😤 今天有点烦</button>
      <button class="mood-btn" onclick="selectMood(this)">🌙 只想休息</button>
    </div>
  </div>

  <!-- 今日备注 -->
  <div class="note-section">
    <div class="note-title">✍️ 今日备注</div>
    <textarea id="noteInput" placeholder="今天有什么想说的…"></textarea>
  </div>

  <button class="save-btn" onclick="saveDay()">打卡完成，存入记忆 ✨</button>

</div>

<div class="toast" id="toast">今日打卡成功！继续加油 🌸</div>

<script>
  const today = new Date();
  const weekdays = ['日','一','二','三','四','五','六'];
  const dayIdx = today.getDay();

  document.getElementById('dateDisplay').textContent = 
    `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日　星期${weekdays[dayIdx]}`;

  const allTasks = {
    fitness: [
      { text: '快走 50分钟（跑步机 6-6.5km/h）', time: '18:00', days: [1,3,5,6,0] },
      { text: '瑜伽 / 普拉提视频 40分钟', time: '18:00', days: [2,4] },
      { text: '饭后散步 40分钟', time: '20:30', days: [0,1,2,3,4,5,6] },
      { text: '晚饭七分饱，清淡饮食', time: '19:00', days: [0,1,2,3,4,5,6] },
    ],
    study: [
      { text: '外贸学习', time: '23:00', days: [1,3,6] },
      { text: 'BEC 初级', time: '23:00', days: [2] },
      { text: '日语（标日 + 听力）', time: '23:00', days: [4,0] },
      { text: 'Anki 日语单词（上班路上）', time: '通勤', days: [1,2,3,4,5] },
      { text: '玄学学习（八字）', time: '15:30', days: [6] },
    ],
    music: [
      { text: '竹笛练习 30分钟', time: '18:00', days: [1,2,3,4,6,0] },
      { text: '竹笛课 🎵', time: '下班后', days: [5] },
    ]
  };

  function getTodayKey() {
    return `bella_${today.getFullYear()}_${today.getMonth()}_${today.getDate()}`;
  }

  function loadState() {
    try {
      return JSON.parse(localStorage.getItem(getTodayKey()) || '{}');
    } catch { return {}; }
  }

  function saveState(state) {
    try { localStorage.setItem(getTodayKey(), JSON.stringify(state)); } catch {}
  }

  let state = loadState();
  if (!state.checked) state.checked = {};

  function renderTasks(category, containerId) {
    const container = document.getElementById(containerId);
    const tasks = allTasks[category].filter(t => t.days.includes(dayIdx));
    
    if (tasks.length === 0) {
      container.innerHTML = `<div style="color:var(--muted);font-size:0.85rem;padding:12px 0;font-family:'Noto Serif SC',sans-serif;">今天没有这项任务，好好休息 🌿</div>`;
      return;
    }

    tasks.forEach((task, i) => {
      const id = `${category}_${i}`;
      const done = state.checked[id];
      const div = document.createElement('div');
      div.className = `task${done ? ' done' : ''}`;
      div.innerHTML = `
        <div class="checkbox">${done ? '✓' : ''}</div>
        <div class="task-text">${task.text}</div>
        <div class="task-time">${task.time}</div>
      `;
      div.onclick = () => toggleTask(id, div);
      container.appendChild(div);
    });
  }

  function toggleTask(id, el) {
    state.checked[id] = !state.checked[id];
    el.classList.toggle('done');
    const cb = el.querySelector('.checkbox');
    cb.textContent = state.checked[id] ? '✓' : '';
    const txt = el.querySelector('.task-text');
    saveState(state);
    updateProgress();
  }

  function updateProgress() {
    const allDivs = document.querySelectorAll('.task');
    const total = allDivs.length;
    const done = document.querySelectorAll('.task.done').length;
    const pct = total ? Math.round(done/total*100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${done} / ${total}`;
  }

  function selectMood(btn) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.mood = btn.textContent;
    saveState(state);
  }

  function updateWeight() {
    const val = parseFloat(document.getElementById('weightInput').value);
    if (!isNaN(val)) {
      const diff = (val - 55).toFixed(1);
      document.getElementById('weightDiff').textContent = diff > 0 ? `${diff}kg` : '已达标！🎉';
      state.weight = val;
      saveState(state);
    }
  }

  document.getElementById('weightInput').addEventListener('input', updateWeight);
  document.getElementById('noteInput').addEventListener('input', () => {
    state.note = document.getElementById('noteInput').value;
    saveState(state);
  });

  // Load streak
  function calcStreak() {
    let streak = 0;
    let d = new Date(today);
    while(true) {
      d.setDate(d.getDate() - 1);
      const key = `bella_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
      const s = JSON.parse(localStorage.getItem(key) || '{}');
      if (s.saved) streak++;
      else break;
      if (streak > 365) break;
    }
    if (state.saved) streak++;
    return streak;
  }

  function saveDay() {
    state.note = document.getElementById('noteInput').value;
    state.saved = true;
    saveState(state);
    document.getElementById('streakNum').textContent = calcStreak();
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // Init
  renderTasks('fitness', 'tasks-fitness');
  renderTasks('study', 'tasks-study');
  renderTasks('music', 'tasks-music');
  updateProgress();

  if (state.mood) {
    document.querySelectorAll('.mood-btn').forEach(b => {
      if (b.textContent === state.mood) b.classList.add('selected');
    });
  }
  if (state.note) document.getElementById('noteInput').value = state.note;
  if (state.weight) {
    document.getElementById('weightInput').value = state.weight;
    updateWeight();
  }
  document.getElementById('streakNum').textContent = calcStreak();
  updateProgress();
</script>
</body>
</html>
